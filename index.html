<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Done."/>
<meta name="theme-color" content="#0f0f0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<title>Done.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --border: #2a2a2a;
    --text: #e8e4de;
    --muted: #5a5652;
    --accent: #c8f565;
    --done-bg: #1a2e0a;
    --done-border: #3a6012;
    --done-text: #c8f565;
    --radius: 16px;
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }

  body.student-mode {
    --bg: #111214;
    --surface: #1a1b1d;
    --border: #2b2d30;
    --text: #ebe8e2;
    --muted: #8d8a84;
    --accent: #b9d95e;
    --done-bg: #1d2812;
    --done-border: #3e5720;
    --done-text: #c7e57a;
  }

  body::before {
    content: '';
    position: fixed;
    top: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 350px;
    background: radial-gradient(ellipse, rgba(200,245,101,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body.student-mode::before {
    background: radial-gradient(ellipse, rgba(185,217,94,0.08) 0%, transparent 70%);
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    padding-top: calc(var(--safe-top) + 16px);
    padding-left: 24px;
    padding-right: 24px;
    padding-bottom: 16px;
    background: rgba(15,15,15,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    animation: fadeSlideDown 0.6s ease both;
  }

  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 600px;
    margin: 0 auto;
    gap: 8px;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    flex-shrink: 0;
  }

  .mode-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 12px;
    width: 32px;
    height: 32px;
    padding: 0;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mode-btn.active {
    border-color: var(--accent);
    background: var(--done-bg);
  }

  /* Student mode icon SVG strokes inherit color */
  .mode-btn .icon-svg { display: block; }
  .mode-btn .icon-svg .icon-stroke { stroke: var(--muted); transition: stroke 0.2s; }
  .mode-btn .icon-svg .icon-fill   { fill:   var(--muted); transition: fill 0.2s; }
  .mode-btn.active .icon-svg .icon-stroke { stroke: var(--accent); }
  .mode-btn.active .icon-svg .icon-fill   { fill:   var(--accent); }

  .student-only {
    display: none !important;
  }

  body.student-mode .student-only {
    display: block !important;
  }

  body.student-mode .deadline-strip.student-only {
    display: flex !important;
  }

  /* ── DEADLINE STRIP — now a single collapsible block ── */
  .deadline-strip {
    max-width: 600px;
    margin: 12px auto 0;
    padding: 10px 12px;
    background: rgba(24,24,24,0.88);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .deadline-main {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .deadline-title {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .deadline-countdown {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .deadline-countdown.urgent {
    color: var(--done-text);
  }

  .deadline-btn {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  /* Inline editor — slides open below strip */
  .deadline-editor {
    max-width: 600px;
    margin: 0 auto;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.3s ease, opacity 0.25s ease, margin-top 0.25s ease;
  }

  .deadline-editor.open {
    max-height: 200px;
    opacity: 1;
    margin-top: 8px;
  }

  .deadline-editor-inner {
    background: rgba(24,24,24,0.92);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr auto auto;
  }

  .deadline-input {
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 10px;
    font-size: 12px;
    outline: none;
    font-family: var(--font-body);
  }

  .deadline-input:focus {
    border-color: var(--accent);
  }

  /* First row: title full width */
  .deadline-input.title-input {
    grid-column: 1 / -1;
  }

  /* Second row: date + save + clear */
  .deadline-row2 {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
  }

  .app-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
    flex-shrink: 0;
  }

  .app-title span { color: var(--accent); }

  /* ── PILL STATS — single line, nowrap ── */
  .pill-stats {
    display: flex;
    gap: 5px;
    align-items: center;
    flex-wrap: nowrap;
    overflow: hidden;
  }

  .pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .pill strong { color: var(--text); font-weight: 500; }
  .pill.green { border-color: var(--done-border); color: var(--done-text); background: var(--done-bg); }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px 20px;
    padding-bottom: calc(100px + var(--safe-bottom));
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .progress-wrap {
    margin-bottom: 20px;
    animation: fadeSlideDown 0.6s 0.1s ease both;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #a8d84a, var(--accent));
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.34,1,0.64,1);
    box-shadow: 0 0 8px rgba(200,245,101,0.5);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 20px;
    padding-left: 4px;
  }

  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── TASK ── */
  .task {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.35s, background 0.35s, box-shadow 0.35s;
    animation: taskEnter 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .task.done {
    background: var(--done-bg);
    border-color: var(--done-border);
    box-shadow: 0 0 0 1px rgba(200,245,101,0.06), 0 4px 20px rgba(200,245,101,0.06);
  }

  /* Reset badge on task — subtle green dot instead of emoji */
  .task.auto-reset .task-text::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--done-text);
    border-radius: 50%;
    margin-left: 7px;
    opacity: 0.5;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(200,245,101,0.18);
    transform: scale(0);
    animation: rippleAnim 0.55s linear;
    pointer-events: none;
  }

  @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

  .check-wrap {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, background 0.3s;
    pointer-events: none;
  }

  .task.done .check-wrap {
    border-color: var(--accent);
    background: var(--accent);
  }

  .check-icon {
    opacity: 0;
    transform: scale(0) rotate(-20deg);
    transition: opacity 0.25s 0.05s, transform 0.25s 0.05s cubic-bezier(0.34,1.56,0.64,1);
    color: #0f0f0f;
    font-size: 13px;
    font-weight: 800;
    pointer-events: none;
    line-height: 1;
  }

  .task.done .check-icon { opacity: 1; transform: scale(1) rotate(0); }

  .task-text {
    flex: 1;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.45;
    word-break: break-word;
    min-width: 0;
    text-decoration: line-through transparent;
    text-decoration-thickness: 1px;
    transition: color 0.35s, text-decoration-color 0.35s;
  }

  .task.done .task-text {
    color: var(--done-text);
    text-decoration-color: var(--done-text);
  }

  .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .action-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .action-btn:active { opacity: 0.7; }
  .action-btn.delete { color: #c05050; border-color: #3a1a1a; background: #1e0a0a; }

  /* Reset-next-day button */
  .action-btn.reset-day {
    font-size: 13px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .action-btn.reset-day .icon-svg .icon-stroke { stroke: var(--muted); transition: stroke 0.2s; }
  .action-btn.reset-day .icon-svg .icon-fill   { fill:   var(--muted); transition: fill 0.2s; }

  .action-btn.reset-day.active {
    color: var(--accent);
    border-color: var(--done-border);
    background: var(--done-bg);
  }

  .action-btn.reset-day.active .icon-svg .icon-stroke { stroke: var(--accent); }
  .action-btn.reset-day.active .icon-svg .icon-fill   { fill:   var(--accent); }

  .action-btn.drag-handle {
    cursor: grab;
    font-size: 16px;
    letter-spacing: -2px;
    touch-action: none;
  }

  .action-btn.drag-handle:active {
    cursor: grabbing;
  }

  .task.dragging {
    position: fixed;
    z-index: 500;
    margin: 0;
    opacity: 0.96;
    cursor: grabbing;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    animation: none;
  }

  .task.drag-placeholder {
    border-style: dashed;
    border-color: var(--accent);
    background: transparent;
    min-height: 58px;
    animation: none;
  }

  .task-edit {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--accent);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 400;
    outline: none;
    padding: 2px 0;
    min-width: 0;
    caret-color: var(--accent);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
    font-style: italic;
    animation: fadeSlideDown 0.4s ease both;
  }

  .empty-icon {
    font-size: 42px;
    display: block;
    margin-bottom: 14px;
    filter: grayscale(1) opacity(0.35);
  }

  /* ── TIMER ── */
  .timer-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 20px;
    animation: fadeSlideDown 0.6s 0.15s ease both;
  }

  .timer-toggle {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .timer-toggle:active { border-color: var(--accent); }

  .timer-toggle-left {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    min-width: 0;
  }

  .timer-toggle-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
  }

  .timer-toggle-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .timer-toggle-value {
    color: var(--accent);
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.06em;
    line-height: 1;
  }

  .timer-panel {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transform: translateY(-4px);
    transition: max-height 0.32s ease, opacity 0.25s ease, transform 0.25s ease, margin-top 0.25s ease;
    margin-top: 0;
  }

  .timer-wrap.open .timer-panel {
    max-height: 460px;
    opacity: 1;
    transform: translateY(0);
    margin-top: 14px;
  }

  .timer-display {
    text-align: center;
    margin-bottom: 20px;
  }

  .timer-time {
    font-size: 48px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .timer-status {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .timer-presets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .timer-preset-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .timer-preset-btn:active, .timer-preset-btn.active {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
  }

  .timer-custom-input {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 12px;
    outline: none;
    padding: 6px 0;
    text-align: center;
    width: 100%;
    margin-bottom: 12px;
    transition: border-color 0.2s;
    caret-color: var(--accent);
  }

  .timer-custom-input:focus { border-color: var(--accent); }
  .timer-custom-input::placeholder { color: var(--muted); }

  .timer-controls { display: flex; gap: 8px; }

  .timer-btn {
    flex: 1;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .timer-btn:active { transform: scale(0.96); }
  .timer-btn.stop { background: var(--border); color: var(--text); }
  .timer-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── BOTTOM ADD BAR ── */
  .add-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 200;
    padding: 14px 20px;
    padding-bottom: calc(14px + var(--safe-bottom));
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
    animation: slideUp 0.5s 0.2s ease both;
  }

  .add-inner {
    display: flex;
    gap: 10px;
    max-width: 600px;
    margin: 0 auto;
  }

  .add-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .add-input::placeholder { color: var(--muted); }

  .add-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,245,101,0.09);
  }

  .add-btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 12px;
    width: 48px;
    height: 48px;
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .add-btn:active { transform: scale(0.94); }

  .install-banner {
    background: var(--done-bg);
    border: 1px solid var(--done-border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeSlideDown 0.5s ease both;
  }

  .install-banner-text {
    flex: 1;
    font-size: 13px;
    color: var(--done-text);
    line-height: 1.4;
  }

  .install-banner-text strong { display: block; margin-bottom: 2px; font-size: 14px; }

  .install-btn-pwa {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .dismiss-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }

  .burst { position: fixed; pointer-events: none; z-index: 9999; }
  .burst-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    transform: translate(-50%,-50%);
    animation: burstFly var(--d,0.6s) ease forwards;
  }

  @keyframes burstFly {
    0%   { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes taskEnter {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes taskExit {
    to { opacity: 0; transform: translateX(30px) scale(0.95); max-height: 0; padding: 0; margin: 0; border: none; }
  }

  .task.removing {
    animation: taskExit 0.3s ease forwards;
    pointer-events: none;
    overflow: hidden;
  }

  ::-webkit-scrollbar { width: 0; }
</style>

<script>
// ─── IST midnight reset helper ────────────────────────────────────────────────
// IST = UTC+5:30
function getISTMidnightISO() {
  const now = new Date();
  // Get current date in IST
  const istOffset = 5.5 * 60; // minutes
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  const istNow = new Date(utcMs + istOffset * 60000);

  // Next midnight IST
  const midnight = new Date(istNow);
  midnight.setHours(24, 0, 0, 0); // next midnight in IST
  // Convert back to UTC ISO
  const midnightUTC = new Date(midnight.getTime() - istOffset * 60000);
  return midnightUTC.toISOString();
}

function msUntilISTMidnight() {
  return new Date(getISTMidnightISO()).getTime() - Date.now();
}

// ─── State ────────────────────────────────────────────────────────────────────
let tasks = [];
try { tasks = JSON.parse(localStorage.getItem('done-tasks') || '[]'); } catch(e){}
if (!tasks.length) {
  tasks = [
    { id: uid(), text: 'Review morning emails 📬', done: false, autoReset: false },
    { id: uid(), text: 'Finish the project proposal', done: false, autoReset: false },
    { id: uid(), text: 'Take a lunch break 🥗', done: true, autoReset: false },
  ];
  save();
}

// Migrate old tasks that don't have autoReset field
tasks = tasks.map(t => ({ autoReset: false, ...t }));

let deadline = null;
try { deadline = JSON.parse(localStorage.getItem('done-deadline') || 'null'); } catch(e){}
let studentMode = localStorage.getItem('done-student-mode') === '1';

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function save() { try { localStorage.setItem('done-tasks', JSON.stringify(tasks)); } catch(e){} }
function saveDeadline() { try { localStorage.setItem('done-deadline', JSON.stringify(deadline)); } catch(e){} }

// ─── Auto-reset at IST midnight ───────────────────────────────────────────────
function scheduleAutoReset() {
  const ms = msUntilISTMidnight();
  setTimeout(() => {
    // Reset all tasks that have autoReset enabled
    let changed = false;
    tasks.forEach(t => {
      if (t.autoReset && t.done) {
        t.done = false;
        changed = true;
      }
    });
    if (changed) { save(); render(); }
    // Schedule next midnight
    scheduleAutoReset();
  }, ms);
}

scheduleAutoReset();

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const addInput      = document.getElementById('addInput');
const addBtn        = document.getElementById('addBtn');
const progressWrap  = document.getElementById('progressWrap');
const progressFill  = document.getElementById('progressFill');
const progressPct   = document.getElementById('progressPct');
const pillStats     = document.getElementById('pillStats');
const pTotal        = document.getElementById('pTotal');
const pDone         = document.getElementById('pDone');
const pendingList   = document.getElementById('pendingList');
const doneList      = document.getElementById('doneList');
const doneSection   = document.getElementById('doneSection');
const pendingLabel  = document.getElementById('pendingLabel');
const deadlineTitle      = document.getElementById('deadlineTitle');
const deadlineCountdown  = document.getElementById('deadlineCountdown');
const deadlineToggle     = document.getElementById('deadlineToggle');
const deadlineEditor     = document.getElementById('deadlineEditor');
const deadlineTitleInput = document.getElementById('deadlineTitleInput');
const deadlineDateInput  = document.getElementById('deadlineDateInput');
const deadlineSaveBtn    = document.getElementById('deadlineSaveBtn');
const deadlineClearBtn   = document.getElementById('deadlineClearBtn');
const studentModeBtn     = document.getElementById('studentModeBtn');

// Timer refs
const timerWrap        = document.getElementById('timerWrap');
const timerToggle      = document.getElementById('timerToggle');
const timerToggleSub   = document.getElementById('timerToggleSub');
const timerToggleValue = document.getElementById('timerToggleValue');
const timerDisplay     = document.getElementById('timerDisplay');
const timerStatus      = document.getElementById('timerStatus');
const timerPresets     = document.getElementById('timerPresets');
const timerCustom      = document.getElementById('timerCustom');
const timerStartBtn    = document.getElementById('timerStartBtn');
const timerStopBtn     = document.getElementById('timerStopBtn');
const timerResetBtn    = document.getElementById('timerResetBtn');
const scrollArea       = document.querySelector('.scroll-area');

// ─── Timer State ──────────────────────────────────────────────────────────────
let timerSeconds = 0;
let timerInterval = null;
let timerRunning = false;
const presets = [
  { label: '1m', seconds: 60 },
  { label: '2m', seconds: 120 },
  { label: '5m', seconds: 300 },
  { label: '1h', seconds: 3600 },
  { label: '2h', seconds: 7200 },
  { label: '3h', seconds: 10800 }
];

// ─── Drag State ───────────────────────────────────────────────────────────────
let dragState = null;

// ─── Deadline State ───────────────────────────────────────────────────────────
let deadlineTicker = null;

function applyStudentMode() {
  document.body.classList.toggle('student-mode', studentMode);
  studentModeBtn.classList.toggle('active', studentMode);
  studentModeBtn.setAttribute('aria-pressed', String(studentMode));

  if (!studentMode) {
    deadlineEditor.classList.remove('open');
    timerWrap.classList.remove('open');
    timerToggle.setAttribute('aria-expanded', 'false');
    if (timerRunning) {
      clearInterval(timerInterval);
      timerRunning = false;
      timerStatus.textContent = 'Paused';
      updateTimerSummary();
      timerStartBtn.style.display = 'flex';
      timerStopBtn.style.display = 'none';
    }
  }
}

// ─── Timer Functions ──────────────────────────────────────────────────────────
function initTimer() {
  presets.forEach(preset => {
    const btn = document.createElement('button');
    btn.className = 'timer-preset-btn';
    btn.textContent = preset.label;
    btn.addEventListener('click', () => setTimer(preset.seconds));
    timerPresets.appendChild(btn);
  });
}

function setTimer(seconds) {
  if (timerRunning) return;
  timerSeconds = seconds;
  updateTimerDisplay();
  updatePresetButtons();
  timerCustom.value = '';
}

function updateTimerDisplay() {
  const mins = Math.floor(timerSeconds / 60);
  const secs = timerSeconds % 60;
  timerDisplay.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  timerToggleValue.textContent = timerDisplay.textContent;
}

function updateTimerSummary() {
  if (timerRunning) { timerToggleSub.textContent = 'Running'; return; }
  timerToggleSub.textContent = timerSeconds > 0 ? 'Ready to start' : 'Tap to set';
}

function updatePresetButtons() {
  document.querySelectorAll('.timer-preset-btn').forEach(btn => {
    btn.classList.remove('active');
    presets.forEach(p => {
      if (btn.textContent === p.label && timerSeconds === p.seconds) btn.classList.add('active');
    });
  });
}

function startTimer() {
  if (timerRunning || timerSeconds === 0) return;
  timerRunning = true;
  timerStatus.textContent = 'Running';
  updateTimerSummary();
  timerStartBtn.style.display = 'none';
  timerStopBtn.style.display = 'flex';

  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      timerStatus.textContent = "Time's up!";
      updateTimerSummary();
      timerStartBtn.style.display = 'flex';
      timerStopBtn.style.display = 'none';
      playTimerSound();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
}

function stopTimer() {
  if (!timerRunning) return;
  clearInterval(timerInterval);
  timerRunning = false;
  timerStatus.textContent = 'Paused';
  updateTimerSummary();
  timerStartBtn.style.display = 'flex';
  timerStopBtn.style.display = 'none';
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  updateTimerDisplay();
  timerStatus.textContent = 'Ready';
  updateTimerSummary();
  timerCustom.value = '';
  timerStartBtn.style.display = 'flex';
  timerStopBtn.style.display = 'none';
  document.querySelectorAll('.timer-preset-btn').forEach(btn => btn.classList.remove('active'));
}

function playTimerSound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.frequency.value = 800;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
    osc.start(audioContext.currentTime);
    osc.stop(audioContext.currentTime + 0.5);
  } catch(e) {}
}

function parseCustomTimer(input) {
  const match = input.trim().toLowerCase().match(/^(\d+)(m|s|h)$/);
  if (!match) return null;
  const value = parseInt(match[1]);
  const unit = match[2];
  if (unit === 'm') return value * 60;
  if (unit === 's') return value;
  if (unit === 'h') return value * 3600;
  return null;
}

// ─── Deadline ─────────────────────────────────────────────────────────────────
function formatCountdownText(targetMs) {
  const diff = targetMs - Date.now();
  if (diff <= 0) return 'Due now';
  const totalHours = Math.floor(diff / (1000 * 60 * 60));
  const days = Math.floor(totalHours / 24);
  const hours = totalHours % 24;
  if (days > 0) return `${days} day${days===1?'':'s'}, ${hours} hour${hours===1?'':'s'}`;
  const minutes = Math.max(1, Math.floor(diff / (1000 * 60)));
  return `${hours} hour${hours===1?'':'s'}, ${minutes % 60} minute${minutes%60===1?'':'s'}`;
}

function toLocalInputValue(isoString) {
  const date = new Date(isoString);
  if (Number.isNaN(date.getTime())) return '';
  const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 16);
}

function renderDeadline() {
  const valid = deadline && deadline.title && deadline.dueAt && !Number.isNaN(new Date(deadline.dueAt).getTime());
  if (!valid) {
    deadlineTitle.textContent = 'No exam deadline set';
    deadlineCountdown.textContent = 'Set one to keep your next due date in view';
    deadlineCountdown.classList.remove('urgent');
    deadlineToggle.textContent = 'Set';
    return;
  }
  const dueMs = new Date(deadline.dueAt).getTime();
  const diffMs = dueMs - Date.now();
  deadlineTitle.textContent = deadline.title;
  deadlineCountdown.textContent = `${formatCountdownText(dueMs)} left`;
  deadlineCountdown.classList.toggle('urgent', diffMs <= 24*60*60*1000 && diffMs > 0);
  deadlineToggle.textContent = 'Edit';
}

function startDeadlineTicker() {
  renderDeadline();
  if (deadlineTicker) clearInterval(deadlineTicker);
  deadlineTicker = setInterval(renderDeadline, 30000);
}

// ─── Events: Timer ────────────────────────────────────────────────────────────
timerToggle.addEventListener('click', () => {
  const isOpen = timerWrap.classList.toggle('open');
  timerToggle.setAttribute('aria-expanded', String(isOpen));
});

timerStartBtn.addEventListener('click', startTimer);
timerStopBtn.addEventListener('click', stopTimer);
timerResetBtn.addEventListener('click', resetTimer);

timerCustom.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const s = parseCustomTimer(timerCustom.value);
    if (s && s > 0) { setTimer(s); timerCustom.blur(); }
  }
});
timerCustom.addEventListener('blur', () => {
  const s = parseCustomTimer(timerCustom.value);
  if (s && s > 0) setTimer(s);
});

// ─── Events: Student mode ─────────────────────────────────────────────────────
studentModeBtn.addEventListener('click', () => {
  studentMode = !studentMode;
  localStorage.setItem('done-student-mode', studentMode ? '1' : '0');
  applyStudentMode();
});

// ─── Events: Deadline ─────────────────────────────────────────────────────────
deadlineToggle.addEventListener('click', () => {
  const open = !deadlineEditor.classList.contains('open');
  deadlineEditor.classList.toggle('open', open);
  if (open) {
    deadlineTitleInput.value = deadline && deadline.title ? deadline.title : '';
    deadlineDateInput.value  = deadline && deadline.dueAt  ? toLocalInputValue(deadline.dueAt) : '';
  }
});

deadlineSaveBtn.addEventListener('click', () => {
  const title = deadlineTitleInput.value.trim();
  const dueValue = deadlineDateInput.value;
  if (!title || !dueValue) return;
  const dueDate = new Date(dueValue);
  if (Number.isNaN(dueDate.getTime())) return;
  deadline = { title, dueAt: dueDate.toISOString() };
  saveDeadline();
  renderDeadline();
  deadlineEditor.classList.remove('open');
});

deadlineClearBtn.addEventListener('click', () => {
  deadline = null;
  saveDeadline();
  renderDeadline();
  deadlineEditor.classList.remove('open');
});

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const total   = tasks.length;
  const doneArr = tasks.filter(t => t.done);
  const pending = tasks.filter(t => !t.done);
  const pct     = total ? Math.round((doneArr.length / total) * 100) : 0;

  progressWrap.style.display = total ? '' : 'none';
  pillStats.style.display    = total ? '' : 'none';
  progressFill.style.width   = pct + '%';
  progressPct.textContent    = pct + '%';
  pTotal.textContent = total;
  pDone.textContent  = doneArr.length;

  pendingLabel.style.display = (pending.length && doneArr.length) ? '' : 'none';
  doneSection.style.display  = doneArr.length ? '' : 'none';

  renderList(pendingList, pending);
  renderList(doneList, doneArr);

  if (!total) {
    pendingList.innerHTML = `<div class="empty"><span class="empty-icon">✦</span>All clear — add something below!</div>`;
  }
}

function renderList(container, arr) {
  const existing = new Map([...container.querySelectorAll('.task')].map(el => [el.dataset.id, el]));

  arr.forEach((t, i) => {
    let el = existing.get(t.id);
    if (!el) {
      el = buildTask(t);
      el.style.animationDelay = (i * 0.04) + 's';
      container.appendChild(el);
    } else {
      el.classList.toggle('done', t.done);
      el.classList.toggle('auto-reset', !!t.autoReset);
      const textEl = el.querySelector('.task-text');
      if (textEl) textEl.textContent = t.text;
      // Update reset-day button state
      const rdb = el.querySelector('.reset-day');
      if (rdb) rdb.classList.toggle('active', !!t.autoReset);
      existing.delete(t.id);
    }
  });

  existing.forEach(el => {
    el.classList.add('removing');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  });

  arr.forEach(t => {
    const el = container.querySelector(`[data-id="${t.id}"]`);
    if (el) container.appendChild(el);
  });
}

function syncOrderFromDom() {
  const pendingIds = [...pendingList.querySelectorAll('.task')].map(el => el.dataset.id);
  const doneIds    = [...doneList.querySelectorAll('.task')].map(el => el.dataset.id);
  const byId = new Map(tasks.map(t => [t.id, t]));
  const reordered = [...pendingIds, ...doneIds].map(id => byId.get(id)).filter(Boolean);
  if (reordered.length !== tasks.length) return;
  tasks = reordered;
  save();
  render();
}

function startTaskDrag(e, taskEl) {
  if (e.button !== undefined && e.button !== 0) return;
  if (dragState) return;

  const list = taskEl.parentElement;
  if (!list || !list.classList.contains('task-list')) return;

  e.preventDefault();
  const rect = taskEl.getBoundingClientRect();
  const placeholder = document.createElement('div');
  placeholder.className = 'task drag-placeholder';
  placeholder.style.height = `${rect.height}px`;
  list.insertBefore(placeholder, taskEl.nextSibling);

  taskEl.classList.add('dragging');
  taskEl.style.width = `${rect.width}px`;
  taskEl.style.left  = `${rect.left}px`;
  taskEl.style.top   = `${rect.top}px`;

  dragState = { taskEl, list, placeholder, offsetY: e.clientY - rect.top };

  document.addEventListener('pointermove', onTaskDragMove);
  document.addEventListener('pointerup', endTaskDrag);
  document.addEventListener('pointercancel', endTaskDrag);
}

function onTaskDragMove(e) {
  if (!dragState) return;
  dragState.taskEl.style.top = `${e.clientY - dragState.offsetY}px`;

  const hovered = document.elementFromPoint(e.clientX, e.clientY);
  const hoveredTask = hovered && hovered.closest('.task');

  if (
    hoveredTask &&
    hoveredTask !== dragState.taskEl &&
    hoveredTask !== dragState.placeholder &&
    hoveredTask.parentElement === dragState.list
  ) {
    const box = hoveredTask.getBoundingClientRect();
    const before = e.clientY < box.top + box.height / 2;
    dragState.list.insertBefore(dragState.placeholder, before ? hoveredTask : hoveredTask.nextSibling);
  }

  if (scrollArea) {
    const areaRect = scrollArea.getBoundingClientRect();
    const edge = 72;
    if (e.clientY < areaRect.top + edge) scrollArea.scrollTop -= 10;
    else if (e.clientY > areaRect.bottom - edge) scrollArea.scrollTop += 10;
  }
}

function endTaskDrag() {
  if (!dragState) return;
  document.removeEventListener('pointermove', onTaskDragMove);
  document.removeEventListener('pointerup', endTaskDrag);
  document.removeEventListener('pointercancel', endTaskDrag);

  const { taskEl, placeholder, list } = dragState;
  taskEl.classList.remove('dragging');
  taskEl.style.width = '';
  taskEl.style.left  = '';
  taskEl.style.top   = '';

  list.insertBefore(taskEl, placeholder);
  placeholder.remove();
  dragState = null;
  syncOrderFromDom();
}

function buildTask(t) {
  const el = document.createElement('div');
  el.className = 'task' + (t.done ? ' done' : '') + (t.autoReset ? ' auto-reset' : '');
  el.dataset.id = t.id;

  el.innerHTML = `
    <div class="check-wrap"><span class="check-icon">✓</span></div>
    <span class="task-text">${esc(t.text)}</span>
    <div class="task-actions">
      <button class="action-btn drag-handle" title="Drag to reorder" aria-label="Drag to reorder">⋮⋮</button>
      <button class="action-btn reset-day${t.autoReset ? ' active' : ''}" title="Reset at midnight IST" aria-label="Toggle daily reset">
        <svg class="icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path class="icon-stroke" d="M 5.5 12 A 5.5 5.5 0 0 1 5.5 4" stroke-width="1.6" stroke-linecap="round"/>
          <path class="icon-stroke" d="M 3.2 6.2 L 5.5 4 L 7.8 6.2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path class="icon-stroke" d="M 10.5 4 A 5.5 5.5 0 0 1 10.5 12" stroke-width="1.6" stroke-linecap="round"/>
          <path class="icon-stroke" d="M 8.2 9.8 L 10.5 12 L 12.8 9.8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="action-btn edit-btn" title="Edit">✎</button>
      <button class="action-btn delete delete-btn" title="Delete">✕</button>
    </div>`;

  el.addEventListener('click', e => {
    if (e.target.closest('.task-actions') || e.target.tagName === 'INPUT') return;
    toggleDone(t.id, e, el);
  });

  el.querySelector('.reset-day').addEventListener('click', e => {
    e.stopPropagation();
    const task = tasks.find(x => x.id === t.id);
    if (!task) return;
    task.autoReset = !task.autoReset;
    save();

    const btn = el.querySelector('.reset-day');
    btn.classList.toggle('active', task.autoReset);
    el.classList.toggle('auto-reset', task.autoReset);

    // Small tooltip feedback
    const prev = btn.title;
    btn.title = task.autoReset ? 'Daily reset ON (resets at 12am IST)' : 'Daily reset OFF';
    if (navigator.vibrate) navigator.vibrate(5);
  });

  el.querySelector('.edit-btn').addEventListener('click', e => {
    e.stopPropagation();
    startEdit(t.id, el);
  });

  el.querySelector('.drag-handle').addEventListener('pointerdown', e => {
    e.stopPropagation();
    startTaskDrag(e, el);
  });

  el.querySelector('.drag-handle').addEventListener('click', e => { e.stopPropagation(); });

  el.querySelector('.delete-btn').addEventListener('click', e => {
    e.stopPropagation();
    el.classList.add('removing');
    el.addEventListener('animationend', () => {
      tasks = tasks.filter(x => x.id !== t.id);
      save(); render();
    }, { once: true });
  });

  return el;
}

function toggleDone(id, e, el) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  save();

  const rect = el.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const rip = document.createElement('span');
  rip.className = 'ripple';
  const size = Math.max(rect.width, rect.height) * 1.5;
  rip.style.cssText = `width:${size}px;height:${size}px;left:${clientX-rect.left-size/2}px;top:${clientY-rect.top-size/2}px`;
  el.appendChild(rip);
  rip.addEventListener('animationend', () => rip.remove());

  if (task.done) burst(clientX, clientY);
  if (navigator.vibrate) navigator.vibrate(task.done ? [8, 40, 8] : 5);

  render();
}

function startEdit(id, el) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const textEl = el.querySelector('.task-text');
  if (!textEl) return;
  const input = document.createElement('input');
  input.className = 'task-edit';
  input.value = task.text;
  input.autocapitalize = 'sentences';
  textEl.replaceWith(input);
  input.focus();
  setTimeout(() => input.select(), 50);

  const finish = () => {
    const val = input.value.trim();
    if (val) task.text = val;
    save(); render();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = task.text; input.blur(); }
  });
}

function addTask(text) {
  if (!text.trim()) return;
  tasks.unshift({ id: uid(), text: text.trim(), done: false, autoReset: false });
  save(); render();
  addInput.value = '';
  if (navigator.vibrate) navigator.vibrate(5);
}

function burst(cx, cy) {
  const wrap = document.createElement('div');
  wrap.className = 'burst';
  wrap.style.left = cx + 'px';
  wrap.style.top  = cy + 'px';
  document.body.appendChild(wrap);
  const cols = ['#c8f565','#a8d84a','#e0ff90','#ffffff','#6fd44a'];
  for (let i = 0; i < 14; i++) {
    const dot = document.createElement('div');
    dot.className = 'burst-dot';
    const angle = (i / 14) * Math.PI * 2;
    const dist  = 35 + Math.random() * 45;
    dot.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    dot.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    dot.style.setProperty('--d', (0.45 + Math.random() * 0.25) + 's');
    dot.style.background = cols[i % cols.length];
    dot.style.animationDelay = (Math.random() * 0.08) + 's';
    wrap.appendChild(dot);
  }
  setTimeout(() => wrap.remove(), 800);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Add bar events ───────────────────────────────────────────────────────────
addBtn.addEventListener('click', () => addTask(addInput.value));
addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(addInput.value); });
addInput.addEventListener('focus', () => {
  setTimeout(() => addInput.scrollIntoView({ behavior: 'smooth', block: 'center' }), 350);
});

// ─── PWA Install ──────────────────────────────────────────────────────────────
let deferredPrompt = null;
const installBanner = document.getElementById('installBanner');
const installBtn    = document.getElementById('installBtn');
const dismissBanner = document.getElementById('dismissBanner');
const iosBanner     = document.getElementById('iosBanner');
const dismissIos    = document.getElementById('dismissIos');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('install-dismissed')) installBanner.style.display = '';
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.style.display = 'none';
});

dismissBanner.addEventListener('click', () => {
  installBanner.style.display = 'none';
  localStorage.setItem('install-dismissed', '1');
});

const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if (isIos && !isStandalone && !localStorage.getItem('ios-dismissed')) {
  iosBanner.style.display = '';
}
dismissIos.addEventListener('click', () => {
  iosBanner.style.display = 'none';
  localStorage.setItem('ios-dismissed', '1');
});

// ─── Service Worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ─── Init ─────────────────────────────────────────────────────────────────────
initTimer();
updateTimerDisplay();
updateTimerSummary();
startDeadlineTicker();
applyStudentMode();
render();
</script>
